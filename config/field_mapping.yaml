  TOTAL_CURRENT_ASSETS: "current_assets"
  TOTAL_NON_CURRENT_ASSETS: "non_current_assets"
  TOTAL_ASSETS: "total_assets"
  TOTAL_CURRENT_LIABILITIES: "current_liabilities"
